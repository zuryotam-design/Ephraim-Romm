<!doctype html>

  <head>

    <!-- Fix image paths BEFORE React loads -->
    <script>
      (function() {
        const basePath = '/Ephraim-Romm';
        
        // Store original fetch
        const originalFetch = window.fetch;
        
        // Intercept fetch calls to rewrite image paths
        window.fetch = function(...args) {
          let url = args[0];
          if (url && typeof url === 'string' && url.includes('/images/') && !url.includes(basePath)) {
            url = url.replace(/\/images\//, basePath + '/images/');
            args[0] = url;
          }
          return originalFetch.apply(this, args);
        };
        
        // Intercept XMLHttpRequest
        const originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
          if (url && typeof url === 'string' && url.includes('/images/') && !url.includes(basePath)) {
            url = url.replace(/\/images\//, basePath + '/images/');
          }
          return originalXHROpen.apply(this, arguments);
        };
        
        // Fix element src attributes
        const imageHandler = (target) => {
          try {
            let src = target.src || target.getAttribute('src');
            if (src && typeof src === 'string' && src.includes('/images/') && !src.includes(basePath)) {
              src = src.replace(/\/images\//, basePath + '/images/');
              target.src = src;
            }
            
            // Also fix style background images
            if (target.style && target.style.backgroundImage) {
              target.style.backgroundImage = target.style.backgroundImage.replace(/\/images\//g, basePath + '/images/');
            }
          } catch (e) {}
        };
        
        // Rewrite all existing images
        const fixImages = () => {
          document.querySelectorAll('img').forEach(imageHandler);
          document.querySelectorAll('[style*="background"]').forEach((el) => {
            const style = el.getAttribute('style') || '';
            if (style.includes('/images/') && !style.includes(basePath)) {
              el.setAttribute('style', style.replace(/\/images\//g, basePath + '/images/'));
            }
          });
        };
        
        // Run on DOM ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fixImages);
        }
        
        // Watch from document start
        fixImages();
        
        // Watch for dynamically added images  
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'childList') {
              mutation.addedNodes.forEach((node) => {
                if (node.nodeType === 1) {
                  if (node.tagName === 'IMG') {
                    imageHandler(node);
                  }
                  node.querySelectorAll?.('img, [style*="background"]').forEach(imageHandler);
                }
              });
            } else if (mutation.type === 'attributes' && mutation.target.tagName === 'IMG') {
              if (mutation.attributeName === 'src') {
                imageHandler(mutation.target);
              }
            }
          });
        });
        
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['src']
        });
        
        window.addEventListener('load', fixImages);
      })();
    </script>
