<html lang="en">
  <head>

<base href="https://zuryotam-design.github.io/Ephraim-Romm/">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ephraim Romm | Engineer of Survival</title>
    <script type="module" crossorigin src="assets/index-CbeEnKWz.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-BTJ_6u2r.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix image paths for GitHub Pages subdirectory deployment
      const basePath = '/Ephraim-Romm';
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'childList') {
            mutation.addedNodes.forEach((node) => {
              if (node.nodeType === 1) { // Element node
                // Fix this node if it's an image
                if (node.tagName === 'IMG' && node.src && node.src.includes('/images/')) {
                  if (!node.src.includes(basePath)) {
                    node.src = node.src.replace(/\/images\//, basePath + '/images/');
                  }
                }
                // Fix all child images
                const images = node.querySelectorAll?.('img') || [];
                images.forEach((img) => {
                  if (img.src && img.src.includes('/images/') && !img.src.includes(basePath)) {
                    img.src = img.src.replace(/\/images\//, basePath + '/images/');
                  }
                });
              }
            });
          }
        });
      });
      
      // Start observing the document for changes
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
      
      // Also fix any images that might load after the script
      window.addEventListener('load', () => {
        document.querySelectorAll('img').forEach((img) => {
          if (img.src && img.src.includes('/images/') && !img.src.includes(basePath)) {
            img.src = img.src.replace(/\/images\//, basePath + '/images/');
          }
        });
      });
    </script>
  </body>
